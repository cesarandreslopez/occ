name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Generate test fixtures
        run: node test/create-fixtures.js

      - name: Verify document scanning
        run: node bin/occ.js test/fixtures/

      - name: Verify JSON output
        run: node bin/occ.js --format json test/fixtures/

      - name: Verify CI mode
        run: node bin/occ.js --ci test/fixtures/

      - name: Verify by-file mode
        run: node bin/occ.js --by-file test/fixtures/

      - name: Verify no-code mode
        run: node bin/occ.js --no-code test/fixtures/
